services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-key
    deploy:
      resources:
        limits:
          memory: 512M
